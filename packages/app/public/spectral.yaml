extends: ["spectral:oas"]
parserOptions:
  duplicateKeys: warn # error is the default value
  incompatibleValues: off # error is the default value
rules:
  oas3-valid-schema-example: off
  oas3-valid-media-example: off
  operation-tag-defined: off
  path-params: off
  
  info-LR04:
    description: info.version should be semantic versioned following x.y.z format
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.info.version"
    then:
      function: schema
      functionOptions:
        schema:
          type: string
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
 
 # info.contact must be present and non-empty object
  info-LR05:
    description: "info.contact must be present and non-empty object"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.info"
    then:
      field: contact
      function: truthy
 
 # info.contact.email must be a valid email
  info-LR06:
    description: "info.contact.email must be a valid email"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.info.contact.email"
    then:
      function: pattern
      functionOptions:
        match: "^[A-Za-z0-9&+_.-]+@[A-Za-z0-9&+_.-]+.[com|org]$"
  
 # info.contact.email must be present and non-empty string
  info-LR08:
    description: "info.contact.email must be present and non-empty string"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.info.contact"
    then:
      field: email
      function: truthy
 
 # info.x-api-type must be present and non-empty string
  info-LR09:
    description: "info.x-api-type must be present and non-empty string"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.info"
    then:
      field: x-api-type
      function: truthy
 
 # info.x-api-type must be either enterprise, experience or inner
  info-LR10:
    description: "info.x-api-type must be either enterprise, experience or inner"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.info.x-api-type"
    then:
      function: enumeration
      functionOptions:
        values:
          - "enterprise"
          - "experience"
          - "inner"
 
 # info.x-application-code must be present and non-empty string
  info-LR13:
    description: "info.x-application-code must be present and non-empty string"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.info"
    then:
      field: x-application-code
      function: truthy
 
 # info.x-application-code must be 4 alphanumerical lowercase characters
  info-LR14:
    description: "info.x-application-code must be 4 alphanumerical lowercase characters"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.info.x-application-code"
    then:
      function: pattern
      functionOptions:
        match: "^[0-9a-z]{4}$"
# Response content should be present
  paths-LR41:
    description: "Response content should be present"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    given: $.paths.*.*.responses[?(@ && @property.match(/^(400|500)/))]
    then:
      field: content
      function: truthy
 
# 4XX and 5XX response content type should be appplication/problem+json
  paths-LR40:
    description: "400 and 500 response content type should be appplication/problem+json"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    given: $.paths.*.*.responses[?(@ && @property.match(/^(400|500)/))]
    then:
      field: content.application/problem+json
      function: truthy
 
 # OperationId must be present and non-empty string
  paths-LR20:
    description: "OperationId must be present and non-empty string"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths.*.*"
    then:
      field: operationId
      function: truthy
 
 # Operation description should be present and non-empty string
  paths-LR21:
    description: "Operation description should be present and non-empty string"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths.*.*"
    then:
      field: description
      function: truthy
 
# Operation tag must be present and non-empty string
  paths-LR22:
    description: "Operation tag must be present and non-empty string"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths.*.*"
    then:
      field: tags
      function: truthy
 
