    then:
      function: pattern
      functionOptions:
        match: "^(200|201|204|400|401|403|404|500|503)$"
 
# PATCH methods should only result in response codes 200, 204, 400, 401, 403, 404 or 500
  paths-LR34:
    description: "PATCH methods should only result in response codes 200, 204, 400, 401, 403, 404 or 500"
    formats: ["oas3"]
