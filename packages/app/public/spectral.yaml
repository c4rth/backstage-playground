# GET methods should only result in response codes 200, 400, 401, 403, 404, 500 or 503
  paths-LR31:
    description: "GET methods should only result in response codes 200, 400, 401, 403, 404, 500 or 503"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths..get.responses.*~"
    then:
      function: pattern
      functionOptions:
        match: "^(200|204|400|401|403|404|500|503)$"
 
# POST methods should only result in response codes 200, 201, 204, 400, 401, 403, 404 , 500 or 503
  paths-LR32:
    description: "POST methods should only result in response codes 200, 201, 204, 400, 401, 403, 404 , 500 or 503"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths..post.responses.*~"
    then:
      function: pattern
      functionOptions:
        match: "^(200|201|204|400|401|403|404|500|503)$"
 
# PUT methods should only result in response codes 200, 201, 204, 400, 401, 403, 404 , 500 or 503
  paths-LR33:
    description: "PUT methods should only result in response codes 200, 201, 204, 400, 401, 403, 404 , 500 or 503"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
