# x-bfunction must be present and non-empty string
  paths-LR25:
    description: "x-bfunction must be present and non-empty string"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths.*.*"
    then:
      field: x-bfunction
      function: truthy
 
 # x-bfunction must follow the format: B + 5 digits
  paths-LR26:
    description: "x-bfunction must follow the format B followed by 5 digits"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths.*.*.x-bfunction"
    then:
      function: pattern
      functionOptions:
        match: "^B\d{5}$"
 
