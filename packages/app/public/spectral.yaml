    then:
      function: pattern
      functionOptions:
        match: "^(200|204|400|401|403|404|500|503)$"
 
# DELETE methods should only result in response codes 200, 204, 400, 401, 403, 404 or 500
  paths-LR35:
    description: "DELETE methods should only result in response codes 200, 204, 400, 401, 403, 404 or 500"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths..patch.responses.*~"
    then:
      function: pattern
      functionOptions:
        match: "^(200|204|400|401|403|404|500|503)$"
 
# Path must not end with a trailing slash
  paths-LR36:
    description: "Path must not end with a trailing slash"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.paths.*~"
    then:
      function: pattern
      functionOptions:
        notMatch: "\/$"
 
# At least a servers.*.url must be present and non-empty array
  servers-LR15:
    description: "At least a servers.*.url must be present and non-empty array"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.servers..url"
    then:
      function: pattern
      functionOptions:
        notMatch: "^$"
 
# servers.*.url must not end with a slash
  servers-LR16:
    description: "servers.*.url must not end with a slash"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.servers..url"
    then:
      function: pattern
      functionOptions:
        notMatch: "\/$"
 
# servers.*.url must start with http:// or  'https://'
  servers-LR17:
    description: "servers.*.url must start with 'http://' or 'https://'"
    formats: ["oas3"]
    message: "{{description}}"
    severity: warn
    resolved: false
    given: "$.servers.[*].url"
    then:
      function: pattern
      functionOptions:
        match: "^(http|https)?:\/{2}"