organization:
  name: Acme

apiPlatform:
  organization: organization
  feedName: feedName
  groupPrefix: c4rth
  dns: api-platform.carth.xyz

appRegistry:
  baseUrl: &appRegistryUrl http://localhost:8080
  fetch: &appRegistryFetchUrl http://localhost:8080/actuator
  version: v2

healthProbes:
  baseUrl: &healthProbesUrl http://localhost:8080/health-probes

mcaComponents:
  serviceBaseUrl: &mcaComponentsServiceUrl http://localhost:8080
  baseTypes:
    baseUrl: &mcaBasetypesUrl http://localhost:8080/basetypes
    listBaseUrl: http://localhost:8080/basetypes/allclasses-frame.html
    schedule:
      frequency: PT2M
      timeout: PT30S
      initialDelay: PT1M
  operations:
    csvBaseUrl: http://localhost:8080/mca/alloperations.csv
    schedule:
      frequency: PT2M
      timeout: PT30S
      initialDelay: PT1M

analytics:
  threshold: PT30D # Threshold in days for deleting old analytics data
  schedule:
    frequency: PT5M
    timeout: PT15M
    initialDelay: PT1M

backend:
  # Used for enabling authentication, secret is shared by all backend plugins
  # See https://backstage.io/docs/auth/service-to-service-auth for
  auth:
    #dangerouslyDisableDefaultAuthPolicy: true
    externalAccess:
      - type: static
        options:
          token: 'my-access-token'
          subject: cicd-system
        accessRestrictions:
          - plugin: api-platform
          - plugin: mca
          - plugin: catalog
      - type: static
        options:
          token: 'mcp-token'
          subject: mcp-clients
        accessRestrictions:
          - plugin: mcp-actions
          - plugin: catalog

  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", "http:", "https:"]
    default-src: ["'self'", "http:", "https:"]
    img-src: ["'self'", "http:", "https:", "data:", "blob:"]
    script-src: ["'self'", "http:", "https:", "data:", "blob:", "'unsafe-eval'"]
    upgrade-insecure-requests: []
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false

  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE, OPTIONS, CONNECT, TRACE]
    credentials: true
    Access-Control-Allow-Origin: '*'
    
  database:
    client: pg
    connection:
      #host: 127.0.0.1
      port: 5432
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    # client: better-sqlite37
    # connection: ":memory:"
  # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir
  reading:
    allow:
      - host: raw.githubusercontent.com
      - host: github.com
  #cache:
  #  store: redis
  #  connection: redis://default:${REDIS_PASSWORD}@127.0.0.1:6379
  actions:
    pluginSources:
      - catalog

permission:
  enabled: true
  # Custom policy configuration
  rbac:
    admin:
      superUsers:
        - group:default/team-a.c
        #- group:default/team-x.c
