proxy:
  # skipInvalidProxies: true
  endpoints:
    '/app-registry':
      target: *appRegistryUrl
      allowedMethods: ['GET']
      allowedHeaders: ['Accept', 'x-api-version']
      # changeOrigin: true
      # Change to "false" in case of using self hosted cluster with a self-signed certificate
      secure: false
    '/operations-sources':
      target: *mcaComponentsServiceUrl
      allowedMethods: ['GET']
      allowedHeaders: ['Accept']
      # changeOrigin: true
      # Change to "false" in case of using self hosted cluster with a self-signed certificate
      secure: false
    '/base-types':
      target: *mcaBasetypesUrl
      allowedMethods: ['GET']
      allowedHeaders: ['Accept']
      # changeOrigin: true
      # Change to "false" in case of using self hosted cluster with a self-signed certificate
      secure: false
    '/health-probes':
      target: *healthProbesUrl
      allowedMethods: ['GET']
      allowedHeaders: ['Accept']
      # changeOrigin: true
      # Change to "false" in case of using self hosted cluster with a self-signed certificate
      secure: false


# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: "external" # Alternatives - 'local', 'external'
  generator:
    runIn: "local" # Alternatives - 'local'
  publisher:
    #type: "local" # Alternatives - 'googleGcs' or 'awsS3'. Read documentation for using alternatives.
    #local:
    #  publishDirectory: "../../publisher-docs"
    type: "azureBlobStorage"
    azureBlobStorage:
      containerName: ${AZURE_STORAGE_CONTAINER_NAME}
      credentials:
        accountName: ${AZURE_STORAGE_ACCOUNT_NAME}

#scaffolder:
# see https://backstage.io/docs/features/software-templates/configuration for software template options

search:
  pg:
    highlightOptions:
      useHighlight: true # Used to enable to disable the highlight feature. The default value is true
      maxWord: 35 # Used to set the longest headlines to output. The default value is 35.
      minWord: 15 # Used to set the shortest headlines to output. The default value is 15.
      shortWord: 3 # Words of this length or less will be dropped at the start and end of a headline, unless they are query terms. The default value of three (3) eliminates common English articles.
      highlightAll: false # If true the whole document will be used as the headline, ignoring the preceding three parameters. The default is false.
      maxFragments: 0 # Maximum number of text fragments to display. The default value of zero selects a non-fragment-based headline generation method. A value greater than zero selects fragment-based headline generation (see the linked documentation above for more details).
      fragmentDelimiter: ' ... ' # Delimiter string used to concatenate fragments. Defaults to " ... ".
  collators:
    catalog:
      filter: 
        kind: ['component', 'system', 'api', 'template']
      batchSize: 5
      schedule:
        frequency: PT1M
        timeout: PT15M
        initialDelay: PT5S        
    apis:
      schedule:
          frequency: PT5M
          timeout: PT15M
          initialDelay: PT5S
    mcaComponents:
      schedule:
          frequency: PT5M
          timeout: PT15M
          initialDelay: PT5S
      limit: 1000
    mcaBaseTypes:
      schedule:
          frequency: PT5M
          timeout: PT15M
          initialDelay: PT5S
      limit: 1000
      
catalog:
  disableRelationsCompatibility: true
  # processingInterval: false
  # processingInterval: { hours: 1 }
  # stitchingStrategy: {mode: 'immediate' }
  orphanStrategy: delete
  rules:
    - allow:
        [
          Component,
          System,
          API,
          Resource,
          Template,
          Domain,
          Location,
          Group,
          User,
        ]
  providers:
    microsoftGraphOrg:
      default:
        target: https://graph.microsoft.com/v1.0
        authority: https://login.microsoftonline.com
        tenantId: ${AZURE_TENANT_ID}
        clientId: ${AZURE_CLIENT_ID}
        clientSecret: ${AZURE_CLIENT_SECRET}
        queryMode: advanced
        user:
          #filter: "accountEnabled eq true and userType eq 'member'"
          select: 
          - "id"
          - "displayName"
          - "description"
          - "mail"
          - "accountEnabled"
        userGroupMember:
          filter: "startswith(displayName,'backstage')"
        group:
          select: 
          - "id"
          - "displayName"
          - "description"
        rules:
          - allow: [User, Group, Domain]
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 5 }
          initialDelay: { seconds: 30 }

spectralLinter:
  openApiRulesetUrl: http://localhost:3000/spectral.yaml

